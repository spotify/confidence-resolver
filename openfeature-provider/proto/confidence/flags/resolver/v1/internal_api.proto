syntax = "proto3";

// IMPORTANT: Package name must match backend expectation for gRPC service discovery
// The full gRPC service name is: confidence.flags.resolver.v1.InternalFlagLoggerService
package confidence.flags.resolver.v1;

import "google/protobuf/timestamp.proto";
import "confidence/flags/resolver/v1/types.proto";

option go_package = "github.com/spotify/confidence-resolver/openfeature-provider/go/confidence/internal/proto/resolverinternal";
option java_package = "com.spotify.confidence.sdk.flags.resolver.v1";
option java_multiple_files = true;
option java_outer_classname = "InternalApiProto";

// Simplified from confidence-resolver/protos/confidence/flags/resolver/v1/internal_api.proto
// Annotations removed for minimal dependencies

service InternalFlagLoggerService {
  // Client writes flag assignment events and resolve logs using client secret authentication.
  rpc ClientWriteFlagLogs(WriteFlagLogsRequest) returns (WriteFlagLogsResponse);

  // Stores materializations for units. Uses client secret authentication.
  rpc WriteMaterializedOperations(WriteOperationsRequest) returns (WriteOperationsResult) {}

  // Loads materializations for units. Uses client secret authentication.
  rpc ReadMaterializedOperations(ReadOperationsRequest) returns (ReadOperationsResult) {}
}

// The service that allows to report flag assigned and other client-side flag
// operations, useful when the resolve engine runs on the customer's premises
message WriteFlagLogsRequest {
  repeated FlagAssigned flag_assigned = 1;

  TelemetryData telemetry_data = 2;

  repeated ClientResolveInfo client_resolve_info = 3;
  repeated FlagResolveInfo flag_resolve_info = 4;
}

message WriteFlagLogsResponse {}

// Collection of telemetry metrics. Counter and histogram fields contain deltas
// since the last flush. Gauge fields are latest point-in-time values.
message TelemetryData {
  // Information about the SDK/provider
  Sdk sdk = 2;

  // Evaluation rate counters using the two-dimensional (reason, error_code) model,
  // aligned with the remote SDK telemetry schema (confidence.telemetry.v1).
  repeated EvaluationRate evaluation_rate = 9;

  // Evaluation outcome counter keyed by (reason, error_code).
  message EvaluationRate {
    uint32 count = 1;
    EvaluationReason reason = 2;
    EvaluationErrorCode error_code = 3;
  }

  // Aligned with confidence.telemetry.v1.EvaluationTrace.EvaluationReason.
  enum EvaluationReason {
    EVALUATION_REASON_UNSPECIFIED = 0;
    EVALUATION_REASON_TARGETING_MATCH = 1;
    EVALUATION_REASON_DEFAULT = 2;
    EVALUATION_REASON_STALE = 3;
    EVALUATION_REASON_DISABLED = 4;
    EVALUATION_REASON_CACHED = 5;
    EVALUATION_REASON_STATIC = 6;
    EVALUATION_REASON_SPLIT = 7;
    EVALUATION_REASON_ERROR = 8;
  }

  // Aligned with confidence.telemetry.v1.EvaluationTrace.EvaluationErrorCode.
  enum EvaluationErrorCode {
    EVALUATION_ERROR_CODE_UNSPECIFIED = 0;
    EVALUATION_ERROR_CODE_PROVIDER_NOT_READY = 1;
    EVALUATION_ERROR_CODE_FLAG_NOT_FOUND = 2;
    EVALUATION_ERROR_CODE_PARSE_ERROR = 3;
    EVALUATION_ERROR_CODE_TYPE_MISMATCH = 4;
    EVALUATION_ERROR_CODE_TARGETING_KEY_MISSING = 5;
    EVALUATION_ERROR_CODE_INVALID_CONTEXT = 6;
    EVALUATION_ERROR_CODE_PROVIDER_FATAL = 7;
    EVALUATION_ERROR_CODE_GENERAL = 8;
  }
}

message ClientInfo {
  string client = 1;
  string client_credential = 2;

  // Information about the SDK used to interact with the API.
  Sdk sdk = 3;
}

message FlagAssigned {
  string resolve_id = 10;

  ClientInfo client_info = 3;

  repeated AppliedFlag flags = 15;

  message AppliedFlag {
    string flag = 1;

    string targeting_key = 2;
    string targeting_key_selector = 3;

    oneof assignment {
      AssignmentInfo assignment_info = 4;
      DefaultAssignment default_assignment = 5;
    }

    string assignment_id = 6;

    string rule = 7;

    repeated FallthroughAssignment fallthrough_assignments = 8;
    google.protobuf.Timestamp apply_time = 9;
  }

  message AssignmentInfo {
    string segment = 1;
    string variant = 2;
  }

  message DefaultAssignment {
    DefaultAssignmentReason reason = 1;
    enum DefaultAssignmentReason {
      DEFAULT_ASSIGNMENT_REASON_UNSPECIFIED = 0;
      NO_SEGMENT_MATCH = 1;
      NO_TREATMENT_MATCH = 2 [deprecated = true];
      FLAG_ARCHIVED = 3;
    }
  }
}

message FallthroughAssignment {
  string rule = 1;

  string assignment_id = 2;

  string targeting_key = 3;
  string targeting_key_selector = 4;
}

message ClientResolveInfo {
  // Resource reference to a client.
  string client = 1;

  // Resource reference to a credential.
  string client_credential = 2;

  // The different evaluation context schema of the client that have been seen recently.
  repeated EvaluationContextSchemaInstance schema = 3;

  // An instance of a schema that was seen
  message EvaluationContextSchemaInstance {
    // Schema of each field in the evaluation context.
    map<string, int32> schema = 1;
  }
}

message FlagResolveInfo {
   // The flag the info is about
   string flag = 1;
   // Information about how variants were resolved.
   repeated VariantResolveInfo variant_resolve_info = 2;

   // Information about how a variant was resolved.
   message VariantResolveInfo {
     // If there was a variant assigned, otherwise not set
     string variant = 1;
     // Number of times the variant was resolved in this period
     int64 count = 3;
   }
}

message WriteOperationsRequest {
  repeated VariantData store_variant_op = 1;
}

message WriteOperationsResult {}

message VariantReadOp {
  string unit = 1;
  string materialization = 2;
  string rule = 3;
}

message InclusionReadOp {
  string unit = 1;
  string materialization = 2;
}

message ReadOp {
  oneof op {
    VariantReadOp variant_read_op = 1;
    InclusionReadOp inclusion_read_op = 2;
  }
}

message ReadOperationsRequest {
  repeated ReadOp ops = 3;
}

message VariantData {
  string unit = 1;
  string materialization = 2;
  string rule = 3;
  string variant = 4;
}

message InclusionData {
  string unit = 1;
  string materialization = 2;
  bool is_included = 3;
}

message ReadResult {
  oneof result {
    VariantData variant_result = 1;
    InclusionData inclusion_result = 2;
  }
}

message ReadOperationsResult {
  repeated ReadResult results = 1;
}
