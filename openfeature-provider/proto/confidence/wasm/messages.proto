syntax = "proto3";

package confidence.wasm;

import "confidence/flags/resolver/v1/types.proto";

option java_package = "com.spotify.confidence.sdk.wasm";
option java_multiple_files = false;
option java_outer_classname = "Messages";
option go_package = "github.com/spotify/confidence-resolver/openfeature-provider/go/confidence/internal/proto/wasm";

message Void {}

message SetResolverStateRequest {
    bytes state = 1;
    string account_id = 2;
    confidence.flags.resolver.v1.Sdk sdk = 3;
}

message Request {
    bytes data = 1;
}

message Response {
    oneof result {
        bytes data = 1;
        string error = 2;
    }
}
