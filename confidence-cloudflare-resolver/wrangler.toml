name = "confidence-cloudflare-resolver"
main = "build/worker/shim.mjs"
compatibility_date = "2025-01-28"

[observability]
enabled = true

[[queues.consumers]]
queue = "flag-logs-queue"
max_batch_size = 100 # max number of messages in a batch
max_batch_timeout = 10 # seconds

[[queues.producers]]
queue = "flag-logs-queue"
binding = "flag_logs_queue"

# KV namespace for /metrics endpoint is created and injected by the deployer.
# See deployer/script.sh for auto-creation of the CONFIDENCE_METRICS_KV binding.

# Sticky assignments storage is created and injected by the deployer.
# Set ENABLE_STICKY_ASSIGNMENTS_KV for KV-backed storage (CONFIDENCE_MATERIALIZATIONS_KV binding).
# Set ENABLE_STICKY_ASSIGNMENTS_DO for Durable Object-backed storage (CONFIDENCE_MATERIALIZATIONS_DO binding).
# These are mutually exclusive.

[vars]
CONFIDENCE_CLIENT_SECRET = "SECRET"
